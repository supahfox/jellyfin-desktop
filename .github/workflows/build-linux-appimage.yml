name: build-linux-appimage

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-cef
        with:
          platform: ${{ github.workflow }}-${{ matrix.arch }}

      - name: Build AppImage
        run: ./dev/linux/appimage/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: dist/JelliumDesktop-*.AppImage
