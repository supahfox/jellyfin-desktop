[package]
name = "jfn-playback"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "jfn_playback"
crate-type = ["rlib"]

[dependencies]
jfn-mpv = { path = "../mpv" }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
] }
