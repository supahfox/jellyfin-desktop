name: build-linux-appimage

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache CEF SDK
        uses: actions/cache@v5
        with:
          path: third_party/cef*
          key: cef-appimage-${{ matrix.arch }}-${{ hashFiles('CEF_VERSION') }}

      - name: Download CEF SDK
        run: python3 dev/tools/download_cef.py

      - name: Build AppImage
        run: ./dev/linux/appimage/build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-appimage-${{ matrix.arch }}
          path: dist/JellyfinDesktop-*.AppImage
