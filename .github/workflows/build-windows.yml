name: build-windows

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  SDL_VERSION: "3.4.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            platform: windows64
            msystem: CLANG64
            pkg_prefix: mingw-w64-clang-x86_64
          - arch: arm64
            runner: windows-11-arm
            platform: windowsarm64
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Cache CEF
        uses: actions/cache@v5
        with:
          path: |
            third_party/cef
            third_party/cef_binary_*
          key: cef-${{ matrix.platform }}-${{ hashFiles('CEF_VERSION') }}

      - name: Download CEF
        run: |
          python dev/download_cef.py --platform ${{ matrix.platform }}

      - name: Download SDL3
        shell: bash
        run: |
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VERSION}/SDL3-devel-${SDL_VERSION}-VC.zip" -o sdl3.zip
          7z x sdl3.zip -othird_party
          mv "third_party/SDL3-${SDL_VERSION}" third_party/SDL

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            ${{ matrix.pkg_prefix }}-cc
            ${{ matrix.pkg_prefix }}-meson
            ${{ matrix.pkg_prefix }}-pkgconf
            ${{ matrix.pkg_prefix }}-ffmpeg
            ${{ matrix.pkg_prefix }}-libplacebo
            ${{ matrix.pkg_prefix }}-libass
            ${{ matrix.pkg_prefix }}-vulkan-headers
            ${{ matrix.pkg_prefix }}-vulkan-loader
            ${{ matrix.pkg_prefix }}-shaderc
            ${{ matrix.pkg_prefix }}-spirv-cross

      - name: Build mpv from source
        shell: pwsh
        run: |
          dev\windows\build_mpv_source.ps1 -Arch ${{ matrix.arch }} -Force

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          winget install KhronosGroup.VulkanSDK --accept-source-agreements --accept-package-agreements
          $sdkPath = Get-ChildItem "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1
          echo "VULKAN_SDK=$($sdkPath.FullName)" >> $env:GITHUB_ENV
          echo "$($sdkPath.FullName)\Bin" >> $env:GITHUB_PATH

      - name: Configure and build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.arch }}
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DSDL3_DIR=%CD%\third_party\SDL\cmake ^
            -DEXTERNAL_MPV_DIR=%CD%\third_party\mpv-install
          cmake --build build

      - name: Create package
        shell: cmd
        run: |
          cmake --install build --prefix build/install
          cd build
          cpack -G ZIP

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ matrix.arch }}
          path: build/jellyfin-desktop-*.zip
