name: build-windows

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            platform: windows64
            msystem: CLANG64
            pkg_prefix: mingw-w64-clang-x86_64
            triple: x86_64-pc-windows-msvc
          - arch: arm64
            runner: windows-11-arm
            platform: windowsarm64
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            triple: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache CEF
        uses: actions/cache@v5
        with:
          path: |
            third_party/cef
            third_party/cef_binary_*
          key: cef-${{ matrix.platform }}-${{ hashFiles('CEF_VERSION') }}

      - name: Download CEF
        run: |
          python dev/tools/download_cef.py --platform ${{ matrix.platform }}

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            ${{ matrix.pkg_prefix }}-cc
            ${{ matrix.pkg_prefix }}-clang
            ${{ matrix.pkg_prefix }}-meson
            ${{ matrix.pkg_prefix }}-pkgconf
            ${{ matrix.pkg_prefix }}-ffmpeg
            ${{ matrix.pkg_prefix }}-libplacebo
            ${{ matrix.pkg_prefix }}-libass
            ${{ matrix.pkg_prefix }}-vulkan-headers
            ${{ matrix.pkg_prefix }}-vulkan-loader
            ${{ matrix.pkg_prefix }}-shaderc
            ${{ matrix.pkg_prefix }}-spirv-cross
            ${{ matrix.pkg_prefix }}-llvm

      - name: Build mpv from source
        shell: pwsh
        run: |
          dev\windows\build_mpv_source.ps1 -Arch ${{ matrix.arch }} -Force

      - name: Build and package
        shell: cmd
        env:
          # bindgen (used by jfn-mpv's build.rs) dlopens libclang at
          # build time. The mingw-w64-clang-*-llvm package ships
          # libclang.dll under the msystem prefix's bin/; cmd.exe
          # doesn't pick that up from setup-msys2, so point bindgen
          # at it explicitly.
          LIBCLANG_PATH: C:\msys64\${{ matrix.msystem }}\bin
          MSYS_BIN: C:\msys64\${{ matrix.msystem }}\bin
          # mingw's libclang doesn't auto-pick the MSVC target triple, so
          # MSVC's arch-specific headers (__int64, vcruntime intrinsics,
          # etc.) get parsed against the wrong default target. Pin it.
          BINDGEN_EXTRA_CLANG_ARGS: --target=${{ matrix.triple }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" %MATRIX_ARCH%
          set "PATH=%PATH%;%MSYS_BIN%"
          cargo xtask package --external-mpv "%CD%\third_party\mpv-install" --prefix build/install --dist dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-${{ matrix.arch }}
          path: dist/JellyfinDesktop-*.zip
